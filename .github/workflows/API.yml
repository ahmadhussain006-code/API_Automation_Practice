name: API Login Negative Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  api-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create reports folder
        run: mkdir -p reports

      - name: Run login negative API tests
        run: |
          pytest tests/test_login_negative_flow.py -v --capture=tee-sys --html=reports/login_negative_report.html --self-contained-html

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: API-Login-Negative-Report
          path: reports/login_negative_report.html